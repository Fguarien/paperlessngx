services:
  redis:
    image: redis:${REDIS_VERSION}
    command: ["redis-server", "--requirepass", "${REDIS_PASS}", "--dir", "/data", "--appendonly", "yes"]
    container_name: ${COMPOSE_PROJECT_NAME}-REDIS
    hostname: paper-redis
    mem_limit: 1g
    mem_reservation: 256m
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    read_only: true
    user: "${REDIS_UID}:${REDIS_GID}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASS}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - ${VOLUME_PATH}/redis:/data:rw
    environment:
      TZ: ${TZ}
      REDIS_PASS: ${REDIS_PASS}
    restart: always
    networks:
      - infrastructure_network
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
  db:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}-DB
    hostname: paper-db
    mem_limit: 4g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - ${VOLUME_PATH}/db:/var/lib/postgresql/data:rw
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
    restart: always
    networks:
      - infrastructure_network
    mem_reservation: 1g
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
  gotenberg:
    image: gotenberg/gotenberg:latest
    container_name: ${COMPOSE_PROJECT_NAME}-GOTENBERG
    hostname: gotenberg
    security_opt:
      - no-new-privileges:true
    user: "${USERMAP_UID}:${USERMAP_GID}"
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    environment:
      TZ: ${TZ}
    restart: always
    networks:
      - infrastructure_network
    mem_limit: 12g
    mem_reservation: 2g
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
  tika:
    image: apache/tika:latest
    container_name: ${COMPOSE_PROJECT_NAME}-TIKA
    hostname: tika
    security_opt:
      - no-new-privileges:true
    user: "${USERMAP_UID}:${USERMAP_GID}"
    environment:
      TZ: ${TZ}
    restart: always
    networks:
      - infrastructure_network
    mem_limit: 12g
    mem_reservation: 2g
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: ${COMPOSE_PROJECT_NAME}-NGX
    hostname: paperless-ngx
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 16G
        reservations:
          cpus: '0.1'
          memory: 2G
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "--max-time", "2", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "${PAPERLESS_PORT}:8000"
    volumes:
      - ${VOLUME_PATH}/data:/usr/src/paperless/data:rw
      - ${VOLUME_PATH}/media:/usr/src/paperless/media:rw
      - ${VOLUME_PATH}/export:/usr/src/paperless/export:rw
      - ${CONSUME_PATH_FRED}:/usr/src/paperless/consume/analogique:rw
      - ${CONSUME_PATH_OLI}:/usr/src/paperless/consume/olivia:rw
      - ${CONSUME_PATH}:/usr/src/paperless/consume/commun:rw
      - ${VOLUME_PATH}/trash:/usr/src/paperless/trash:rw
    environment:
      TZ: ${TZ}
      PAPERLESS_TIME_ZONE: ${TZ}
      PAPERLESS_REDIS: redis://:${REDIS_PASS}@paper-redis:6379
      PAPERLESS_DBENGINE: postgresql
      PAPERLESS_DBHOST: paper-db
      PAPERLESS_DBNAME: ${POSTGRES_DB}
      PAPERLESS_DBUSER: ${POSTGRES_USER}
      PAPERLESS_DBPASS: ${POSTGRES_PASS}
      PAPERLESS_EMPTY_TRASH_DIR: ../trash
      PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ correspondent }}/{{ document_type }}/{{ title }}"
      PAPERLESS_OCR_ROTATE_PAGES_THRESHOLD: 6
      PAPERLESS_TASK_WORKERS: 3
      USERMAP_UID: ${USERMAP_UID}
      USERMAP_GID: ${USERMAP_GID}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_URL: ${PAPERLESS_URL}
      PAPERLESS_CSRF_TRUSTED_ORIGINS: ${PAPERLESS_CSRF_TRUSTED_ORIGINS}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
      PAPERLESS_TESSERACT_LANGUAGES: ${PAPERLESS_TESSERACT_LANGUAGES}
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://gotenberg:3000"
      PAPERLESS_TIKA_ENDPOINT: "http://tika:9998"
      PAPERLESS_CONSUMER_RECURSIVE: ${PAPERLESS_CONSUMER_RECURSIVE}
      PAPERLESS_CONSUMER_IGNORE_PATTERNS: ${PAPERLESS_CONSUMER_IGNORE_PATTERNS}
      PAPERLESS_CONSUMER_POLLING: ${PAPERLESS_CONSUMER_POLLING}
      PAPERLESS_APPS: ${PAPERLESS_APPS}
      PAPERLESS_SOCIALACCOUNT_PROVIDERS: ${PAPERLESS_SOCIALACCOUNT_PROVIDERS}
      PAPERLESS_LOGOUT_REDIRECT_URL: ${PAPERLESS_LOGOUT_REDIRECT_URL}
      PAPERLESS_SOCIAL_AUTO_SIGNUP: ${PAPERLESS_SOCIAL_AUTO_SIGNUP}
      PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: ${PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS} 
      PAPERLESS_SOCIALACCOUNT_EMAIL_AUTHENTICATION: ${PAPERLESS_SOCIALACCOUNT_EMAIL_AUTHENTICATION}     
    restart: always
    networks:
      - infrastructure_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tika:
        condition: service_started
      gotenberg:
        condition: service_started
    labels:
      - com.centurylinklabs.watchtower.enable=true
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "3"
networks:
  infrastructure_network:
    external: true
